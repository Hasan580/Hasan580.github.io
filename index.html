<!-- Add this CSS to your existing styles -->
<style>
    /* Add to existing :root variables */
    :root {
        --bg-pattern: linear-gradient(45deg, 
            rgba(255,255,255,0.02) 10%,
            rgba(0,0,0,0.02) 90%);
    }

    body {
        position: relative;
        overflow-x: hidden;
    }

    .background-pattern {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        opacity: 0.1;
        background: var(--bg-pattern);
    }

    .motivational-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8rem;
        font-weight: 900;
        white-space: nowrap;
        color: var(--primary);
        opacity: 0.03;
        user-select: none;
        z-index: -1;
        animation: float 20s infinite linear;
    }

    @keyframes float {
        0% { transform: translate(-50%, -50%) rotate(-5deg); }
        50% { transform: translate(-50%, -55%) rotate(5deg); }
        100% { transform: translate(-50%, -50%) rotate(-5deg); }
    }

    /* Add particle effect */
    .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
    }

    .particle {
        position: absolute;
        background: currentColor;
        opacity: 0.05;
        border-radius: 50%;
        animation: particle-float 3s infinite;
    }

    @keyframes particle-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
</style>

<!-- Add these elements right after <body> tag -->
<body>
    <div class="background-pattern"></div>
    
    <div class="motivational-text">
        <span>CREATIVITY</span>
        <span>VISION</span>
        <span>STORYTELLING</span>
        <span>MOMENTS</span>
        <span>PASSION</span>
    </div>

    <div class="particles">
        <!-- JavaScript will add particles dynamically -->
    </div>

    <!-- Add this script at the end before </body> -->
    <script>
        // Create particle effect
        function createParticles() {
            const particles = document.querySelector('.particles');
            for(let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 5 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 2 + 's';
                particles.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
