<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious Bites Menu</title>
</head>
<body>
<audio loop controls src="Billie_Eilish_-_everything_i_wanted_(Lyrics)_[_YouConvert.net_].mp3">
    <!-- Header Section -->
    <header>
        <img id="header-img" src="restaurant_logo.png" alt="Restaurant Logo" width="150">
        <h1>Delicious Bites</h1>
        <nav>
            <a href="#menu">Menu</a> | 
            <a href="#order-form">Place Your Order</a>
        </nav>
    </header>

    <!-- Main Section -->
    <main>

        <!-- Menu Section -->
        <section id="menu">
            <h2>Menu</h2>
            
            <article>
                <img src="burger.jpg" alt="Cheeseburger" width="150">
                <h3>Cheeseburger</h3>
                <p><i>A juicy beef patty with melted cheese, lettuce, and tomato. $8.99</i></p>
            </article>

            <article>
                <img src="pizza.jpg" alt="Pepperoni Pizza" width="150">
                <h3>Pepperoni Pizza</h3>
                <p><i>Freshly baked pizza with spicy pepperoni and mozzarella cheese. $12.99</i></p>
            </article>

            <article>
                <img src="pasta.jpg" alt="Creamy Alfredo Pasta" width="150">
                <h3>Creamy Alfredo Pasta</h3>
                <p><i>Pasta in a rich and creamy Alfredo sauce with parmesan cheese. $10.99</i></p>
            </article>
        </section>

        <!-- Order Form Section -->
        <section id="order-form">
            <h2>Place Your Order</h2>
            <form>
                <label for="burger">Cheeseburger (Qty):</label>
                <input type="number" id="burger" name="burger" min="0"><br><br>

                <label for="pizza">Pepperoni Pizza (Qty):</label>
                <input type="number" id="pizza" name="pizza" min="0"><br><br>

                <label for="pasta">Alfredo Pasta (Qty):</label>
                <input type="number" id="pasta" name="pasta" min="0"><br><br>

                <p>Select Extras:</p>
                <input type="checkbox" id="extra-cheese" name="extra-cheese">
                <label for="extra-cheese">Extra Cheese</label><br>

                <input type="checkbox" id="extra-sauce" name="extra-sauce">
                <label for="extra-sauce">Extra Sauce</label><br><br>

                <label for="special-requests">Special Requests:</label><br>
                <textarea id="special-requests" name="special-requests" rows="4" cols="30"></textarea><br><br>

                <input type="submit" value="Go To Checkout">
            </form>
        </section>

    </main>

    <!-- Footer Section -->
    <footer>
        <p>Made with love by حسن</p>
    </footer>

</body>
</html>
