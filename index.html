<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan Firas - Professional Videographer</title>
    <style>
        :root {
            --primary: #FF4D4D;
            --secondary: #00CFC8;
            --bg-light: #f8f9fa;
            --text-light: #333;
            --bg-dark: #0a0a0a;
            --text-dark: #f1f1f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        body {
            background: var(--bg-light);
            color: var(--text-light);
        }

        body.dark-mode {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        nav {
            padding: 20px 50px;
            position: fixed;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        body.dark-mode nav {
            background: rgba(10, 10, 10, 0.95);
        }

        nav a {
            margin-right: 30px;
            text-decoration: none;
            color: inherit;
            font-weight: 500;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 50px;
            opacity: 0;
            animation: fadeIn 1s forwards 0.5s;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .hero h2 {
            font-size: 1.5rem;
            color: inherit;
            margin-bottom: 10px;
            font-weight: 400;
            opacity: 0;
            animation: fadeInUp 0.8s forwards 0.3s;
        }

        .hero p {
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 600px;
            margin: 20px 0;
            opacity: 0;
            animation: fadeInUp 0.8s forwards 0.5s;
        }

        .contact-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s forwards 0.7s;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .mode-toggle {
            position: fixed;
            top: 25px;
            right: 50px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: inherit;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            nav {
                padding: 20px;
                text-align: center;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .mode-toggle {
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="mode-toggle" onclick="toggleDarkMode()">🌓</button>
    <nav>
        <a href="#portfolio">Portfolio</a>
        <a href="#about">About</a>
        <a href="#pricing">Pricing</a>
        <a href="#reviews">Reviews</a>
        <a href="#contact">Contact</a>
    </nav>

    <section class="hero">
        <h2>Professional Videographer</h2>
        <h2>Shootings in New York</h2>
        <h1>Hello, I Am<br>Hassan Firas</h1>
        <p>Videography is the art of capturing moments and turning them into memories. It is a way to tell stories and share experiences with others.</p>
        <button class="contact-btn">Contact Me</button>
    </section>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            // Save user preference
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
        }

        // Check saved preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Smooth scroll for navigation
        document.querySelectorAll('nav a').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const section = document.querySelector(this.getAttribute('href'));
                section.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
